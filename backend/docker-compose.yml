version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: jobportal_postgres
    environment:
      POSTGRES_DB: jobportal_db
      POSTGRES_USER: aashish
      POSTGRES_PASSWORD: aashish123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: jobportal_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: